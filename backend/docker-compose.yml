# PrismAgents backend — split into a one-shot `migrate` job and the API.
#
# Both services share the same image (built once). The `migrate` service
# overrides CMD to run `prisma migrate deploy` against Neon and then exits;
# `api` waits for it to finish successfully before starting.
#
# Connection strings (set in backend/.env):
#   DATABASE_URL  — Neon pooled string (used by the API at runtime)
#   DIRECT_URL    — Neon direct string (used by prisma migrate)
# Prisma's schema.prisma already maps `directUrl = env("DIRECT_URL")`, so the
# right string is picked automatically for each path.
#
# Frontend is deployed separately on Vercel — nothing here serves the UI.
# Set FRONTEND_URL in backend/.env to your Vercel domain for CORS.
#
# Local usage:
#   cd backend && docker compose up --build
#
# Render (production) uses render.yaml at the repo root instead of this file:
#   - Single Docker web service (rootDir: backend) builds from the same Dockerfile.
#   - On the free plan, render.yaml's startCommand chains `prisma migrate deploy`
#     before uvicorn (free has no preDeployCommand). On Starter+, migrations move
#     into a top-level preDeployCommand. Either way the `migrate` service below
#     does not exist on Render.
#   - Render injects $PORT (default 10000); the Dockerfile's CMD honors it.

name: prism-agents-backend

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: prism-agents/backend:latest
    container_name: prism-agents-migrate
    env_file:
      - .env
    # Override the image's default uvicorn CMD with a one-shot migration run.
    # Exits 0 on success, non-zero if migrations fail — which blocks `api`.
    command: ["prisma", "migrate", "deploy"]
    restart: "no"

  api:
    image: prism-agents/backend:latest
    container_name: prism-agents-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Container-internal port — must match EXPOSE in Dockerfile.
      PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
